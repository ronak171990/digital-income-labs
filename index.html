<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // Prevent sandboxed iframe context exceptions when third-party scripts or extensions try to override window.fetch
      (function() {
        try {
          var originalFetch = window.fetch;
          var currentFetch = originalFetch;
          Object.defineProperty(window, 'fetch', {
            get: function() {
              return currentFetch;
            },
            set: function(val) {
              currentFetch = val;
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          try {
            var customFetchValue = window.fetch;
            Object.defineProperty(Window.prototype, 'fetch', {
              get: function() {
                return customFetchValue;
              },
              set: function(val) {
                customFetchValue = val;
              },
              configurable: true,
              enumerable: true
            });
          } catch (err) {
            console.warn("Could not patch window.fetch setter:", err);
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
